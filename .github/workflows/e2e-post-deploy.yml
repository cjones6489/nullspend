name: E2E Post-Deploy

# Runs after Vercel reports a successful deployment (Preview or Production)
# OR manually via workflow_dispatch. Executes the full E2E framework against
# the resolved target URL.
#
# Triggers:
#   - deployment_status — any Vercel deploy that lands in state=success on
#     environment=Preview or Production. Both are covered because pushing
#     to main goes straight to Production in the current setup (Vercel
#     never creates Preview deploys for direct main pushes).
#   - workflow_dispatch — manual run against a custom URL. Used for:
#     * First-time validation after secrets are configured
#     * Smoke-testing the framework after e2e changes
#     * Rerunning post-deploy tests on-demand after a flake
#
# Required repository secrets (set via `gh secret set <name>` interactively):
#   - E2E_API_KEY        — dashboard API key for a dedicated E2E test org.
#                          Create in the dashboard under Keys; mark as E2E.
#   - E2E_DEV_ACTOR      — UUID of the E2E test user for session-bypass
#                          (used by legacy scripts/e2e-smoke.ts only; will
#                          be removed in Slice 4 after the port).
#   - E2E_DATABASE_URL   — Supabase pooler connection string for test-scoped
#                          SQL cleanup. Must use pooler host (not direct
#                          IPv6 URL) — see memory/project_production_urls.md.
#   - E2E_OPENAI_API_KEY — OpenAI API key for the proxy PONG test. Low-spend
#                          budget recommended (<$1/month at current cadence).
#                          If missing, proxy-reachable tests auto-skip.

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      preview_url:
        description: "Target URL (Vercel preview or production URL to run e2e against)"
        required: true

jobs:
  e2e-post-deploy:
    # Run on:
    #  1. manual workflow_dispatch (any time)
    #  2. successful Vercel deploys — both Preview and Production.
    # The Slice 1 framework is designed to be safe to run against production
    # (see tests/e2e/infra/dashboard-routes-sweep.e2e.test.ts comments about
    # the Supabase auth circuit breaker handling).
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.deployment_status.state == 'success' &&
       (github.event.deployment_status.environment == 'Preview' ||
        github.event.deployment_status.environment == 'Production'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build all @nullspend/* workspace packages via the shared
      # composite action used by ci.yml. Single source of truth —
      # no more drift between the two workflows. See the action file
      # at .github/actions/build-workspace-packages/action.yml for
      # the build order and rationale.
      - name: Build workspace packages
        uses: ./.github/actions/build-workspace-packages

      # Pre-flight: verify the required secrets are actually set. If any are
      # missing, fail FAST with a clear message naming the missing secret
      # and how to set it. This prevents the workflow from silently running
      # with empty env vars and producing confusing downstream failures.
      - name: Verify required secrets are present
        env:
          E2E_API_KEY: ${{ secrets.E2E_API_KEY }}
          E2E_DEV_ACTOR: ${{ secrets.E2E_DEV_ACTOR }}
          E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          E2E_OPENAI_API_KEY: ${{ secrets.E2E_OPENAI_API_KEY }}
        run: |
          MISSING=()
          [ -z "$E2E_API_KEY" ]      && MISSING+=("E2E_API_KEY (required — dashboard API key for test org)")
          [ -z "$E2E_DEV_ACTOR" ]    && MISSING+=("E2E_DEV_ACTOR (required — test user UUID)")
          [ -z "$E2E_DATABASE_URL" ] && MISSING+=("E2E_DATABASE_URL (required — Supabase pooler connection)")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: Required secrets are missing:"
            printf '  - %s\n' "${MISSING[@]}"
            echo ""
            echo "Set them with:"
            echo "  gh secret set E2E_API_KEY"
            echo "  gh secret set E2E_DEV_ACTOR"
            echo "  gh secret set E2E_DATABASE_URL"
            echo "  gh secret set E2E_OPENAI_API_KEY  # optional, unlocks proxy PONG test"
            echo ""
            exit 1
          fi

          if [ -z "$E2E_OPENAI_API_KEY" ]; then
            echo "NOTE: E2E_OPENAI_API_KEY is not set. The proxy-reachable"
            echo "      test suite will auto-skip. Set it to unlock full coverage:"
            echo "      gh secret set E2E_OPENAI_API_KEY"
          fi
          echo "All required secrets are present."

      # Read untrusted webhook inputs into env vars FIRST, never interpolate
      # `${{ github.event.* }}` directly into bash. See GitHub Actions
      # hardening guide: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
      #
      # URL resolution rules:
      #   - workflow_dispatch: use the URL the user passed
      #   - deployment_status Preview: use the per-deployment URL from
      #     the event payload (Vercel's Preview URLs are public)
      #   - deployment_status Production: use the STABLE public domain
      #     (www.nullspend.dev), NOT the per-deployment URL. Vercel's
      #     per-deployment URLs for Production are behind Deployment
      #     Protection by default and return 401 to public HTTP clients,
      #     so our `curl /api/health` wait loop times out.
      #     (See: .github/workflows/e2e-post-deploy.yml Slice 1h commit.)
      - name: Resolve target URL
        id: url
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_URL: ${{ github.event.inputs.preview_url }}
          DEPLOYMENT_URL: ${{ github.event.deployment_status.target_url }}
          ENVIRONMENT: ${{ github.event.deployment_status.environment }}
          PRODUCTION_URL: ${{ vars.NULLSPEND_PRODUCTION_URL || 'https://www.nullspend.dev' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            URL="$DISPATCH_URL"
            ENV_LABEL="manual"
          elif [ "$ENVIRONMENT" = "Production" ]; then
            # Override the per-deployment URL with the stable prod domain.
            # Vercel does atomic swaps, so by the time deployment_status
            # fires with state=success, the stable URL is already serving
            # the new deployment.
            URL="$PRODUCTION_URL"
            ENV_LABEL="Production"
            echo "Production deploy detected — using stable URL instead of per-deployment URL"
          else
            URL="$DEPLOYMENT_URL"
            ENV_LABEL="$ENVIRONMENT"
          fi
          if [ -z "$URL" ]; then
            echo "No target URL found"; exit 1
          fi
          echo "Target: $URL ($ENV_LABEL)"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "env_label=$ENV_LABEL" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment health
        env:
          TARGET_URL: ${{ steps.url.outputs.url }}
        run: |
          for i in $(seq 1 30); do
            if curl -sf "$TARGET_URL/api/health" > /dev/null 2>&1; then
              echo "Deployment reachable"; exit 0
            fi
            sleep 2
          done
          echo "Deployment not reachable after 60s"; exit 1

      # EC-5: verify the deployed commit SHA matches the commit that
      # triggered this workflow run. Catches Vercel auto-rollback,
      # multiple-rapid-deploy races, and the brief atomic-swap window
      # where the stable URL hasn't yet pointed at the new deployment.
      #
      # Skip on workflow_dispatch: manual runs don't necessarily
      # correspond to a specific commit. Skip when the endpoint
      # returns null commit_sha: local dev or non-Vercel target.
      # Skip when we can't reach /api/version (e.g., the endpoint
      # doesn't exist yet in an older deployment being verified).
      #
      # Up to 5 retries with 3s delay to tolerate atomic-swap window.
      - name: Verify deployed commit SHA matches workflow commit
        if: github.event_name == 'deployment_status'
        env:
          TARGET_URL: ${{ steps.url.outputs.url }}
          EXPECTED_SHA: ${{ github.sha }}
          ENVIRONMENT: ${{ steps.url.outputs.env_label }}
        run: |
          echo "Expected SHA: $EXPECTED_SHA"
          echo "Target:       $TARGET_URL ($ENVIRONMENT)"

          for attempt in 1 2 3 4 5; do
            RESPONSE=$(curl -sf "$TARGET_URL/api/version" 2>&1) || RESPONSE=""
            if [ -z "$RESPONSE" ]; then
              echo "Attempt $attempt: /api/version unreachable, retrying in 3s..."
              sleep 3
              continue
            fi

            DEPLOYED_SHA=$(echo "$RESPONSE" | grep -oE '"commit_sha":"[a-f0-9]+"' | head -1 | sed 's/"commit_sha":"//;s/"$//')
            if [ -z "$DEPLOYED_SHA" ] || [ "$DEPLOYED_SHA" = "null" ]; then
              echo "Attempt $attempt: /api/version returned null commit_sha."
              echo "Target is likely not a Vercel deployment. Skipping SHA verification."
              echo "Response: $RESPONSE"
              exit 0
            fi

            echo "Attempt $attempt: deployed SHA = $DEPLOYED_SHA"
            if [ "$DEPLOYED_SHA" = "$EXPECTED_SHA" ]; then
              echo "SHA match — deployed commit corresponds to this workflow run."
              exit 0
            fi

            echo "SHA mismatch (expected $EXPECTED_SHA, got $DEPLOYED_SHA)"
            if [ $attempt -lt 5 ]; then
              echo "Retrying in 3s to tolerate atomic-swap window..."
              sleep 3
            fi
          done

          echo ""
          echo "FAIL: deployed commit_sha never matched the expected SHA after 5 attempts."
          echo ""
          echo "This indicates one of:"
          echo "  1. Vercel auto-rolled back this deployment (check Vercel dashboard)"
          echo "  2. A newer commit landed before this workflow could verify"
          echo "  3. The stable URL ($TARGET_URL) isn't serving this commit yet"
          echo ""
          echo "Expected: $EXPECTED_SHA"
          echo "Got:      $DEPLOYED_SHA"
          exit 1

      # Slice 1 infra suite — CSP nonce freshness, /api/health all-components-ok,
      # DNS/SSL for prod hosts, proxy reachable (incl. cost event DB
      # verification), dashboard route crash sweep.
      # Closes launch-night P0-1/A2, P0-C, P0-D, P0-E, P0-F, P1-19 detection gaps.
      - name: Run e2e infra tests (Slice 1)
        env:
          NULLSPEND_BASE_URL: ${{ steps.url.outputs.url }}
          NULLSPEND_PROXY_URL: ${{ vars.NULLSPEND_PROXY_URL || 'https://proxy.nullspend.dev' }}
          NULLSPEND_API_KEY: ${{ secrets.E2E_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.E2E_OPENAI_API_KEY }}
          # Gap-7: DB verification that PONG cost events land in
          # Postgres. Reuses the existing E2E_DATABASE_URL secret
          # that the legacy e2e-smoke.ts step already uses.
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          # Drift-3 / G-18: verbose /api/health gate. Optional secret.
          # If not set in GitHub secrets, the E2E test auto-downgrades
          # to non-verbose assertions. If set, the test passes the
          # `x-ops-health-secret` header to unlock verbose.
          INTERNAL_HEALTH_SECRET: ${{ secrets.INTERNAL_HEALTH_SECRET }}
          CI: "true"
        run: pnpm e2e:run tests/e2e/infra/

      # Legacy scripts/e2e-smoke.ts is DISABLED in CI until Slice 4 ports it.
      #
      # Why disabled: The script's reachability check at line 1154 does
      # `GET /api/actions?limit=1` with an x-nullspend-key header — but
      # that route uses session auth (resolveSessionContext), not API key
      # auth. It only succeeds when the server has NULLSPEND_DEV_MODE=true
      # set, triggering the dev-actor fallback in lib/auth/session.ts.
      # Production servers don't have dev mode enabled (that would be a
      # global auth bypass), so the script fails immediately.
      #
      # Historically this wasn't noticed because the workflow condition
      # was `environment == 'Preview'` and never matched — it ran zero
      # times in CI for the repo's entire history (359 skipped runs).
      # Slice 1a fixed the condition; Slice 1c fixed the missing sdk build;
      # and now we've surfaced the actual logic gap.
      #
      # Slice 4 replaces this script with tests/e2e/dashboard/*.e2e.test.ts
      # files that use the bootstrap org's API key against POST routes
      # (which DO use authenticateApiKey) and use direct DB ops via
      # DATABASE_URL for state assertions. Those tests work against prod.
      #
      # Until then, Slice 1 infra tests are the sole post-deploy gate.
      # They cover every launch-night P0 class (CSP, health, DNS/SSL,
      # proxy reachability, routes-sweep crash detection).
      #
      # To run the legacy script LOCALLY for dev validation:
      #   pnpm dev                    # dev server with NULLSPEND_DEV_MODE=true
      #   pnpm e2e                    # hits http://127.0.0.1:3000
      #
      # - name: Run e2e dashboard tests (legacy scripts/e2e-smoke.ts)
      #   env:
      #     NULLSPEND_BASE_URL: ${{ steps.url.outputs.url }}
      #     NULLSPEND_API_KEY: ${{ secrets.E2E_API_KEY }}
      #     NULLSPEND_DEV_ACTOR: ${{ secrets.E2E_DEV_ACTOR }}
      #     DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      #   run: pnpm tsx scripts/e2e-smoke.ts --no-cleanup

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-post-deploy-results-${{ steps.url.outputs.env_label || 'manual' }}-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      # Notify Slack on failure — only if post-deploy caught a real regression.
      # Success runs are silent to avoid alert fatigue. Requires SLACK_QA_WEBHOOK_URL
      # secret; auto-skips inside the step if not set (secrets.* is not
      # available in `if:` expressions, so the gate is in the bash body).
      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_QA_WEBHOOK_URL: ${{ secrets.SLACK_QA_WEBHOOK_URL }}
          TARGET_URL: ${{ steps.url.outputs.url }}
          ENV_LABEL: ${{ steps.url.outputs.env_label }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_QA_WEBHOOK_URL" ]; then
            echo "SLACK_QA_WEBHOOK_URL not set, skipping Slack notification"
            exit 0
          fi
          PAYLOAD=$(cat <<JSON
          {
            "text": "E2E post-deploy failed on ${ENV_LABEL} (${TARGET_URL})",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*E2E post-deploy failed* — \`${ENV_LABEL}\` deploy\\n<${RUN_URL}|View run> · <${TARGET_URL}|Target>"
                }
              }
            ]
          }
          JSON
          )
          curl -sS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_QA_WEBHOOK_URL" || true
