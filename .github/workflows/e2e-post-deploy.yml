name: E2E Post-Deploy

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      preview_url:
        description: "Vercel preview URL"
        required: true

jobs:
  e2e-smoke:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment == 'Preview')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:build && pnpm cost-engine:build

      - name: Resolve preview URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            URL="${{ github.event.inputs.preview_url }}"
          else
            URL="${{ github.event.deployment_status.target_url }}"
          fi
          if [ -z "$URL" ]; then
            echo "No preview URL found"; exit 1
          fi
          echo "Preview URL: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment health
        run: |
          for i in $(seq 1 30); do
            if curl -sf "${{ steps.url.outputs.url }}/api/health" > /dev/null 2>&1; then
              echo "Deployment reachable"; exit 0
            fi
            sleep 2
          done
          echo "Deployment not reachable after 60s"; exit 1

      - name: Run e2e smoke tests
        env:
          NULLSPEND_BASE_URL: ${{ steps.url.outputs.url }}
          NULLSPEND_API_KEY: ${{ secrets.E2E_API_KEY }}
          NULLSPEND_DEV_ACTOR: ${{ secrets.E2E_DEV_ACTOR }}
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
        run: pnpm tsx scripts/e2e-smoke.ts --no-cleanup
