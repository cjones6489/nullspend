name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build all @nullspend/* workspace packages via the shared
      # composite action. Keep in sync by editing the action file
      # directly — both workflows pick up the change automatically.
      - name: Build workspace packages
        uses: ./.github/actions/build-workspace-packages

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Root tests
        run: pnpm test

      - name: Proxy tests
        run: pnpm proxy:test

      - name: SDK tests
        run: pnpm sdk:test

      - name: MCP server tests
        run: pnpm mcp:test

      - name: Claude agent tests
        run: pnpm claude-agent:test

      - name: Cost engine tests
        run: pnpm cost-engine:test

      - name: DB tests
        run: pnpm db:test

      - name: Docs MCP tests
        run: pnpm docs-mcp:test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-results
          path: |
            test-results/
          retention-days: 14
          if-no-files-found: ignore
