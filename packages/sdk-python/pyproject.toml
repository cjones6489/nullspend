[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nullspend"
version = "0.2.0"
description = "Python SDK for NullSpend — FinOps for AI agents"
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
authors = [{ name = "NullSpend", email = "hello@nullspend.dev" }]
dependencies = ["httpx>=0.25.0"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "respx>=0.21"]

[project.urls]
Homepage = "https://nullspend.dev"
Documentation = "https://nullspend.dev/docs"
Repository = "https://github.com/NullSpend/nullspend"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
nullspend = ["_pricing_data.json", "py.typed"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
