name: Bug Report
description: Report a bug in NullSpend
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - "@nullspend/sdk"
        - "@nullspend/cost-engine"
        - "@nullspend/claude-agent"
        - "@nullspend/mcp-server"
        - "@nullspend/mcp-proxy"
        - "@nullspend/proxy"
        - "@nullspend/docs"
        - "@nullspend/db"
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Install @nullspend/sdk
        2. Call `getModelPricing("openai", "gpt-4o")`
        3. See incorrect result
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Package version (e.g., 0.1.0)
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.
