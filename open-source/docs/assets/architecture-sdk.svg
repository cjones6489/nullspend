<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .title { font-size: 13px; font-weight: 600; }
    .subtitle { font-size: 11px; fill: #6b7280; }
    .label { font-size: 11px; font-weight: 500; }
    .small { font-size: 10px; fill: #9ca3af; }
    .step-num { font-size: 10px; font-weight: 700; fill: white; }
    @media (prefers-color-scheme: dark) {
      .box { stroke: #374151; }
      .box-fill { fill: #1f2937; }
      .sdk-fill { fill: #1a1a2e; }
      .title { fill: #f9fafb; }
      .label { fill: #e5e7eb; }
      .subtitle { fill: #9ca3af; }
      .small { fill: #6b7280; }
      .arrow { stroke: #6b7280; fill: #6b7280; }
      .step-bg { fill: #8b5cf6; }
      .divider { stroke: #374151; }
    }
    @media (prefers-color-scheme: light) {
      .box { stroke: #d1d5db; }
      .box-fill { fill: #f9fafb; }
      .sdk-fill { fill: #f5f3ff; }
      .title { fill: #111827; }
      .label { fill: #374151; }
      .subtitle { fill: #6b7280; }
      .small { fill: #9ca3af; }
      .arrow { stroke: #9ca3af; fill: #9ca3af; }
      .step-bg { fill: #7c3aed; }
      .divider { stroke: #e5e7eb; }
    }
  </style>

  <!-- Agent Box -->
  <rect x="30" y="60" width="200" height="200" rx="12" class="box box-fill" stroke-width="1.5"/>
  <text x="130" y="90" text-anchor="middle" class="title">Your Agent</text>

  <!-- SDK box nested inside Agent -->
  <rect x="50" y="105" width="160" height="140" rx="8" class="box sdk-fill" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="130" y="128" text-anchor="middle" class="label">@nullspend/sdk</text>

  <circle cx="75" cy="152" r="9" class="step-bg"/>
  <text x="75" y="156" text-anchor="middle" class="step-num">1</text>
  <text x="93" y="156" class="small">Intercept request</text>

  <circle cx="75" cy="177" r="9" class="step-bg"/>
  <text x="75" y="181" text-anchor="middle" class="step-num">2</text>
  <text x="93" y="181" class="small">Parse response</text>

  <circle cx="75" cy="202" r="9" class="step-bg"/>
  <text x="75" y="206" text-anchor="middle" class="step-num">3</text>
  <text x="93" y="206" class="small">Calculate cost</text>

  <circle cx="75" cy="227" r="9" class="step-bg"/>
  <text x="75" y="231" text-anchor="middle" class="step-num">4</text>
  <text x="93" y="231" class="small">Report to NullSpend</text>

  <!-- Arrow: Agent -> Provider (direct) -->
  <line x1="230" y1="140" x2="640" y2="140" class="arrow" stroke-width="1.5"/>
  <polygon points="640,136 648,140 640,144" class="arrow"/>
  <text x="435" y="133" text-anchor="middle" class="label">Direct API call</text>
  <text x="435" y="148" text-anchor="middle" class="small">Your traffic goes straight to the provider</text>

  <!-- Arrow: Provider -> Agent (response) -->
  <line x1="640" y1="170" x2="230" y2="170" class="arrow" stroke-width="1.5"/>
  <polygon points="230,166 222,170 230,174" class="arrow"/>

  <!-- Provider Box -->
  <rect x="650" y="100" width="160" height="120" rx="12" class="box box-fill" stroke-width="1.5"/>
  <text x="730" y="150" text-anchor="middle" class="title">AI Provider</text>
  <text x="730" y="170" text-anchor="middle" class="subtitle">OpenAI</text>
  <text x="730" y="186" text-anchor="middle" class="subtitle">Anthropic</text>

  <!-- Arrow: SDK -> NullSpend API (async report) -->
  <line x1="130" y1="260" x2="130" y2="295" class="arrow" stroke-width="1.5" stroke-dasharray="5 3"/>
  <polygon points="126,295 130,303 134,295" class="arrow"/>

  <!-- NullSpend API Box -->
  <rect x="30" y="305" width="200" height="30" rx="8" class="box box-fill" stroke-width="1.5"/>
  <text x="130" y="325" text-anchor="middle" class="subtitle">NullSpend API &middot; Dashboard &middot; Webhooks</text>

  <!-- Note -->
  <text x="435" y="300" text-anchor="middle" class="label">No proxy in the request path</text>
  <text x="435" y="316" text-anchor="middle" class="small">Cost tracking via SDK wrapper &middot; Budget status via API</text>
</svg>
